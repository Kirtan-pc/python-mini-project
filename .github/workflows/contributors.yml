name: contributor automation

on:
  schedule:
    - cron: '0 0 * * *'
  pull_request_target:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    if: github.event_name == 'schedule' || (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Contributors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          # Use a temporary file for the contributors list
          echo "[]" > contributors.json
          PAGE=1
          
          echo "Fetching contributors from GitHub API..."
          while true; do
            # Using the contributors endpoint which is more efficient than parsing all PRs
            # Adding a timeout and retry logic via curl-like behavior of gh api
            RESPONSE=$(gh api --timeout 30s "/repos/${{ github.repository }}/contributors?per_page=100&page=${PAGE}" || echo "FAILED")
            
            if [ "$RESPONSE" = "FAILED" ]; then
              echo "API call failed or timed out. Retrying in 5 seconds..."
              sleep 5
              RESPONSE=$(gh api --timeout 60s "/repos/${{ github.repository }}/contributors?per_page=100&page=${PAGE}" || exit 1)
            fi
            
            COUNT=$(echo "$RESPONSE" | jq '. | length')
            if [ "$COUNT" -eq 0 ]; then break; fi
            
            # Merge and filter out bots
            jq -s '.[0] + [.[1][] | select(.type != "Bot")]' contributors.json <(echo "$RESPONSE") > tmp.json && mv tmp.json contributors.json
            
            if [ "$COUNT" -lt 100 ]; then break; fi
            PAGE=$((PAGE + 1))
          done
          
          # Extract only logins
          jq '[.[] | .login] | unique' contributors.json > contributor_logins.json

      - name: Build Contributor Grid
        run: |
          set -euo pipefail
          
          # Create an HTML grid: 6 columns, professional layout
          echo "<table border=\"0\">" > gallery.html
          echo "  <tr>" >> gallery.html
          
          COL=0
          for USERNAME in $(jq -r '.[]' contributor_logins.json); do
            if [ "$COL" -eq 6 ]; then
              echo "  </tr>" >> gallery.html
              echo "  <tr>" >> gallery.html
              COL=0
            fi
            
            echo "    <td align=\"center\" width=\"120\">" >> gallery.html
            echo "      <a href=\"https://github.com/${USERNAME}\">" >> gallery.html
            echo "        <img src=\"https://github.com/${USERNAME}.png?size=100\" width=\"100\" height=\"100\" style=\"border-radius:50%; border:2px solid #555;\" alt=\"${USERNAME}\" /><br />" >> gallery.html
            echo "        <sub><b>@${USERNAME}</b></sub>" >> gallery.html
            echo "      </a>" >> gallery.html
            echo "    </td>" >> gallery.html
            
            COL=$((COL + 1))
          done
          
          # Fill remaining cells in the last row if needed
          while [ "$COL" -lt 6 ] && [ "$COL" -gt 0 ]; do
             echo "    <td width=\"120\"></td>" >> gallery.html
             COL=$((COL + 1))
          done
          
          echo "  </tr>" >> gallery.html
          echo "</table>" >> gallery.html

      - name: Update README.md
        run: |
          set -euo pipefail
          
          # Check for markers
          if ! grep -q "<!-- CONTRIBUTORS_START -->" README.md || ! grep -q "<!-- CONTRIBUTORS_END -->" README.md; then
            echo "Error: Markers missing in README.md"
            exit 1
          fi

          # Replace content between markers
          # Using a temporary file for safe replacement
          sed -n '1,/<!-- CONTRIBUTORS_START -->/p' README.md > README.new
          cat gallery.html >> README.new
          sed -n '/<!-- CONTRIBUTORS_END -->/,$p' README.md >> README.new
          mv README.new README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to README."
          else
            git commit -m "docs: update contributor gallery [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi
